apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simple
  template:
    metadata:
      labels:
        app: simple
    spec:
      containers:
      - name: simple-container
        image: jenkins-simple-cicd:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
